<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>shard-db HN Explorer</title>
  <!-- Dark rounded tile background -->
  <rect width="64" height="64" rx="12" fill="#15171a"/>
  <!-- Three angled "shards" — parallelograms tilted ~22°, stacked with
       depth via opacity. Suggests a cluster of database fragments without
       being literal about it. Reads at 16x16. -->
  <g transform="translate(32 32) rotate(-22)">
    <rect x="-18" y="-13" width="32" height="7" rx="2" fill="#ff6600" opacity="0.45"/>
    <rect x="-18" y="-3"  width="32" height="7" rx="2" fill="#ff6600" opacity="0.75"/>
    <rect x="-18" y="7"   width="32" height="7" rx="2" fill="#ff6600"/>
  </g>
</svg>
